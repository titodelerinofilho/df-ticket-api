services:
  df-ticket-php:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    volumes:
      - ./:/var/www
    depends_on:
      - df-ticket-database
      - df-ticket-redis

  df-ticket-nginx:
    build:
      context: .
      dockerfile: ./docker/nginx/Dockerfile
    ports:
      - "8082:80"
    volumes:
      - ./:/var/www
    depends_on:
      - df-ticket-php

  df-ticket-database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: df_ticket
      POSTGRES_USER: df_ticket
      POSTGRES_PASSWORD: df_ticket
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  df-ticket-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
