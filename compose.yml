services:
  df-ticket-php:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    volumes:
      - ./:/var/www
    depends_on:
      - df-ticket-database
      - df-ticket-redis
    networks:
      - df-ticket-network

  df-ticket-nginx:
    build:
      context: .
      dockerfile: ./docker/nginx/Dockerfile
    ports:
      - "8082:80"
    volumes:
      - ./:/var/www
    depends_on:
      - df-ticket-php
    networks:
      - df-ticket-network

  df-ticket-database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - df-ticket-network

  df-ticket-redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - df-ticket-network

volumes:
  postgres_data:
  redis_data:

networks:
  df-ticket-network:
    driver: bridge
